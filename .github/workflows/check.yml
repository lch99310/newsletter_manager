name: Check for Updates

on:
  schedule:
    # Run daily at 08:00 UTC (adjust to your timezone)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send (ignore cache, resend all articles)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run newsletter check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}
        run: npm run check

      - name: Commit cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --cached --quiet || git commit -m "chore: update article cache [skip ci]"
          git push
